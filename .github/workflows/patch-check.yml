name: patch-check

# 非发布验证：复用只读的 build.yml（应用 overlay、编 clang、跑完整构建门槛），
# 默认编四个主流 Android ABI 所需的 AArch64/ARM/X86 后端。正式发版由 discover.yml 聚合产物后完成。
on:
  push:
    branches: [ feat/vmp-phase2 ]
  workflow_dispatch:
    inputs:
      ndk_tag: { description: "取基线 LLVM 源码所用的 NDK tag", required: false, default: "r29" }
      internal: { description: "该 NDK 内部版本号", required: false, default: "29.0.14206865" }
      targets: { description: "LLVM_TARGETS_TO_BUILD（需覆盖四 ABI）", required: false, default: "AArch64;ARM;X86" }
  pull_request:
    paths:
    - "obfuscation/**"
    - "scripts/apply_overlay.sh"
    - "scripts/overlay_ndk.sh"
    - "tests/string-enc/**"
    - "tests/abi-smoke/**"
    - "tests/build-system-smoke/**"
    - "tests/discover/**"
    - "scripts/discover_ndk.py"
    - ".github/workflows/build.yml"
    - ".github/workflows/patch-check.yml"

# PR 检查与可复用构建都只需要读取仓库内容。
permissions:
  contents: read

jobs:
  discover-unit:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: python tests/discover/test_discover.py

  verify:
    uses: ./.github/workflows/build.yml
    with:
      ndk_tag: ${{ github.event.inputs.ndk_tag || 'r29' }}
      our_tag: patch-check
      internal: ${{ github.event.inputs.internal || '29.0.14206865' }}
      channel: stable
      host: linux-x86_64
      mode: build
      targets: ${{ github.event.inputs.targets || 'AArch64;ARM;X86' }}
      download_url: ""
