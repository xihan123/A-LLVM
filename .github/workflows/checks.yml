name: checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Python syntax
        run: python -m py_compile scripts/*.py tests/discover/test_discover.py tests/locate-llvm/test_locate_llvm.py
      - name: Discovery tests
        run: python tests/discover/test_discover.py
      - name: LLVM location tests
        run: python tests/locate-llvm/test_locate_llvm.py
      - name: Build-system smoke runner tests
        run: bash tests/build-system-smoke/test_run.sh
      - name: Shell syntax
        run: bash -n scripts/*.sh tests/*/*.sh
