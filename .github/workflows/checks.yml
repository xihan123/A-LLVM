name: checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Python syntax
        run: python -m py_compile scripts/*.py tests/discover/test_discover.py tests/locate-llvm/test_locate_llvm.py
      - name: Discovery tests
        run: python tests/discover/test_discover.py
      - name: LLVM location tests
        run: python tests/locate-llvm/test_locate_llvm.py
      - name: Shell syntax
        run: bash -n scripts/*.sh tests/*/*.sh
