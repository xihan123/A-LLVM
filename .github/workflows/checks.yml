name: checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scripts:
    runs-on: [ self-hosted, Linux, X64 ]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - if: ${{ runner.environment == 'github-hosted' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Python syntax
        run: python3 -m py_compile scripts/*.py tests/discover/test_discover.py tests/locate-llvm/test_locate_llvm.py
      - name: Discovery tests
        run: python3 tests/discover/test_discover.py
      - name: LLVM location tests
        run: python3 tests/locate-llvm/test_locate_llvm.py
      - name: Build-system smoke runner tests
        run: bash tests/build-system-smoke/test_run.sh
      - name: Shell syntax
        run: bash -n scripts/*.sh tests/*/*.sh
